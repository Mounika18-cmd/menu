<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Static Weather Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .weather-dashboard {
      background-color: rgba(255, 255, 255, 0.85);
      padding: 30px 40px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      max-width: 350px;
      width: 90%;
      text-align: center;
    }

    .city {
      font-size: 2.2rem;
      font-weight: 700;
      color: #34495e;
      margin-bottom: 10px;
    }

    .temperature {
      font-size: 4rem;
      font-weight: 900;
      color: #e67e22;
      margin: 10px 0;
    }

    .weather-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 15px auto;
    }

    .description {
      font-size: 1.3rem;
      font-weight: 600;
      color: #2980b9;
      text-transform: capitalize;
      margin-bottom: 20px;
    }

    .details {
      display: flex;
      justify-content: space-around;
      font-size: 1rem;
      color: #7f8c8d;
    }

    .detail-item {
      text-align: center;
    }

    .detail-item span {
      display: block;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 5px;
    }
  
    @media (max-width: 400px) {
      .weather-dashboard {
        padding: 20px 25px;
      }

      .temperature {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>

  <section class="weather-dashboard" aria-label="Current weather information">
    <div class="city" id="city">City Name</div>
    <img src="" alt="Weather Icon" class="weather-icon" id="weatherIcon" />
    <div class="temperature" id="temperature">--°C</div>
    <div class="description" id="description">Weather Description</div>

    <div class="details">
      <div class="detail-item">
        <span id="humidity">--%</span>
        Humidity
      </div>
      <div class="detail-item">
        <span id="windSpeed">-- km/h</span>
        Wind Speed
      </div>
      <div class="detail-item">
        <span id="pressure">-- hPa</span>
        Pressure
      </div>
    </div>
  </section>

  <script>
    // Static weather data object
    const weatherData = {
      city: "Puttur",
      temperature: 18,
      description: "clear sky",
      icon: "01d",  // OpenWeatherMap icon code example
      humidity: 72,
      windSpeed: 15, // km/h
      pressure: 1013 // hPa
    };

    // Function to update the dashboard with weatherData
    function updateWeatherDashboard(data) {
      document.getElementById('city').textContent = data.city;
      document.getElementById('temperature').textContent = `${data.temperature}°C`;
      document.getElementById('description').textContent = data.description;
      document.getElementById('humidity').textContent = `${data.humidity}%`;
      document.getElementById('windSpeed').textContent = `${data.windSpeed} km/h`;
      document.getElementById('pressure').textContent = `${data.pressure} hPa`;

      // OpenWeatherMap icons URL pattern: https://openweathermap.org/img/wn/{icon}@2x.png
      const iconUrl = `https://openweathermap.org/img/wn/${data.icon}@2x.png`;
      const iconImg = document.getElementById('weatherIcon');
      iconImg.src = iconUrl;
      iconImg.alt = `Weather icon showing ${data.description}`;
    }

    // Initialize dashboard on page load
    updateWeatherDashboard(weatherData);
  </script>
  
</body>
</html>
